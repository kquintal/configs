# =============================================================================
# MINIMAL TMUX CONFIGURATION
# =============================================================================

# Set prefix to Ctrl-a (easier than default Ctrl-b)
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Set fish as default shell (installed via Homebrew)
set-option -g default-shell /opt/homebrew/bin/fish

# =============================================================================
# COLORS & APPEARANCE
# =============================================================================

# Status bar position (top instead of bottom)
set -g status-position top

# Status bar colors
set -g status-style bg="#56526e",fg="#e0def4"
set -g status-left '[#S]'
set -g status-right "#(date '+%a, %b %d - %I:%M') "

# Window colors
set-window-option -g window-status-style dim
set-window-option -g window-status-current-style fg="#f6c177",bright

# Pane border colors
set -g pane-border-style fg=colour235,bg=default
set -g pane-active-border-style fg=colour51,bg=default

# Mode colors (copy mode, etc.)
set -wg mode-style bg="#f06292",fg="#f5f5f5"

# Enable true color support
set -g default-terminal "$TERM"
set -ag terminal-overrides ",$TERM:Tc"

# =============================================================================
# BASIC FUNCTIONALITY
# =============================================================================

# Reload config
bind r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"

# Split panes (horizontal and vertical)
bind-key - split-window -v
bind-key | split-window -h

# PageDown in copy mode
bind -T copy-mode PageDown send-keys -X page-down

# New window
bind c new-window
