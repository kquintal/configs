# =============================================================================
# MINIMAL TMUX CONFIGURATION
# =============================================================================

# Set prefix to Ctrl-a (easier than default Ctrl-b)
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Set fish as default shell (installed via Homebrew)
set-option -g default-shell /opt/homebrew/bin/fish

# =============================================================================
# COLORS & APPEARANCE
# =============================================================================

# Status bar position (top instead of bottom)
set -g status-position top

# Status bar colors
set -g status-style bg="#56526e",fg="#e0def4"
set -g status-left '[#S] '
set -g status-right " #{pane_current_path} | #(date '+%a, %b %d - %I:%M') "
set -g window-status-format " #I:#{window_name} "
set -g window-status-current-format " #I:#{window_name} "

# Window colors
set-window-option -g window-status-style dim
set-window-option -g window-status-current-style fg="#f6c177",bright

# Pane border colors
set -g pane-border-style fg=colour235,bg=default
set -g pane-active-border-style fg=colour51,bg=default

# Mode colors (copy mode selection highlight)
set -wg mode-style bg="#a6e3a1",fg="#191724"

# Enable true color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:Tc"

# =============================================================================
# MOUSE & COPY
# =============================================================================

# Let tmux handle the mouse so drag-selection is clipped to a single pane
# (without this, the terminal does the selecting and highlights across the
# pane divider / between panels).
set -g mouse on

# Use vi-style keys in copy mode
set-window-option -g mode-keys vi

# Drag-release copies the selection to the macOS clipboard and stays put
# (no jump-to-bottom). Selection is constrained to the active pane.
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# y in copy mode also copies to the macOS clipboard
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# Scroll wheel moves a few lines per notch instead of jumping whole pages.
# Tune the -N number (lines per notch) to taste.
bind-key -T copy-mode-vi WheelUpPane   select-pane \; send-keys -X -N 2 scroll-up
bind-key -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 2 scroll-down

# Escape exits copy mode (vi mode-keys only clears the selection by default)
bind-key -T copy-mode-vi Escape send-keys -X cancel

# =============================================================================
# BASIC FUNCTIONALITY
# =============================================================================

# Reload config
bind r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"

# Split panes (horizontal and vertical)
bind-key - split-window -v
bind-key | split-window -h

# PageDown in copy mode
bind -T copy-mode PageDown send-keys -X page-down

# New window
bind c new-window

# =============================================================================
# PLUGINS (via TPM)
# =============================================================================

# Plugin manager
set -g @plugin 'tmux-plugins/tpm'

# Save/restore sessions across restarts
# Save: prefix + Ctrl-s | Restore: prefix + Ctrl-r
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Auto-save every 15 minutes, auto-restore on tmux start
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# Restore pane contents
set -g @resurrect-capture-pane-contents 'on'

# Initialize TPM (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
