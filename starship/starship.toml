"$schema" = 'https://starship.rs/config-schema.json'

# Blank line between prompts for breathing room
add_newline = true

# Prompt layout: context line, then the input character on its own line
format = """
$directory\
$git_branch\
$git_metrics\
$git_state\
$nodejs\
$python\
$rust\
$kubernetes\
$aws\
$cmd_duration\
$time\
$line_break\
$character"""

[character]
success_symbol = '[➜](bold green)'
error_symbol = '[➜](bold red)'
vimcmd_symbol = '[](bold green)'

[directory]
truncation_length = 3
truncate_to_repo = true
style = 'bold cyan'
read_only = ' '
read_only_style = 'red'

[git_branch]
symbol = ' '
style = 'bold purple'
format = 'on [$symbol$branch]($style) '

[git_metrics]
disabled = false
added_style = 'bold green'
deleted_style = 'bold red'
format = '([+$added]($added_style) )([-$deleted]($deleted_style) )'

[time]
disabled = false
time_format = '%H:%M'
style = 'bold white'
format = 'at [$time]($style) '

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = 'bold red'

[cmd_duration]
min_time = 2000
format = 'took [$duration]($style) '
style = 'bold yellow'

[nodejs]
symbol = ' '
style = 'bold green'
format = 'via [$symbol($version )]($style)'
detect_extensions = ['js', 'mjs', 'cjs', 'ts', 'tsx', 'jsx']
detect_files = ['package.json', '.nvmrc']

[python]
symbol = ' '
style = 'bold yellow'
format = 'via [$symbol($version )(\($virtualenv\) )]($style)'

[rust]
symbol = ' '
style = 'bold red'
format = 'via [$symbol($version )]($style)'

[kubernetes]
disabled = false
symbol = '☸ '
style = 'bold blue'
format = 'on [$symbol$context( \($namespace\))]($style) '

[aws]
symbol = ' '
style = 'bold #ff8700'
format = 'on [$symbol($profile )(\($region\) )]($style)'

[package]
disabled = true
